<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DebateMe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="join-wrapper">
  <div class="join-card">
    <div class="join-logo">
      <h1>Debate<span>Me</span></h1>
      <p>Join a room and start the conversation</p>
    </div>

    <div class="form-group">
      <label for="username">Username</label>
      <input id="username" type="text" placeholder="Enter your name" autocomplete="off">
    </div>

    <div class="form-group">
      <label for="room">Room ID</label>
      <input id="room" type="text" placeholder="Enter room code" autocomplete="off">
    </div>

    <button class="btn-join" onclick="join()">Join Room</button>
  </div>
</div>

<script>
function join() {
  const username = document.getElementById("username").value.trim();
  const room = document.getElementById("room").value.trim();
  if (!username || !room) return;

  localStorage.setItem("username", username);
  localStorage.setItem("room", room);

  window.location.href = "chat.html";
}

document.addEventListener("keydown", (e) => {
  if (e.key === "Enter") join();
});
</script>

</body>
</html>
