<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DebateMe — Room</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="chat-body">

<div class="chat-page">
  <header class="chat-header">
    <div class="chat-header-left">
      <div class="chat-header-icon">💬</div>
      <div>
        <h2 id="roomTitle">Room</h2>
        <div class="room-label">Live debate room</div>
      </div>
    </div>
    <button class="btn-leave" onclick="leave()">Leave Room</button>
  </header>

  <div class="chat-messages" id="chat"></div>

  <div class="chat-input-bar">
    <input id="msg" type="text" placeholder="Type a message…" autocomplete="off">
    <button class="btn-send" onclick="send()">Send</button>
  </div>
</div>

<script src="app.js"></script>

</body>
</html>
